<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collab PM Board</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
  <h2>🚀 Collab PM</h2>
  <input id="username" placeholder="Enter Username" required>
  <select id="role">
    <option value="Owner">Owner</option>
    <option value="Editor">Editor</option>
    <option value="Viewer">Viewer</option>
  </select>
  <button id="loginBtn">Enter Board</button>
</div>

<div id="app" style="display:none">
<header>
  <div class="left">
    <span id="userInfo"></span>
    <div class="theme-switch">
      <button onclick="setTheme('light')">Light</button>
      <button onclick="setTheme('dark')">Dark</button>
      <button onclick="setTheme('high')">High</button>
    </div>
  </div>
  <div class="right">
    <input id="search" placeholder="Search..." oninput="debounceSearch()">
    <select id="filterPriority" onchange="applyFilters()"><option value="">All Priority</option><option>Low</option><option>Medium</option><option>High</option></select>
    <select id="filterAssignee" onchange="applyFilters()"><option value="">All Users</option></select>
    <button id="addTaskBtn" onclick="openModal()">+ Add Task</button>
    <button id="logoutBtn">Logout</button>
  </div>
</header>

<main id="board">
  <div class="column" data-col="Todo"><h3>Todo <span class="count"></span></h3><div class="dropzone"></div></div>
  <div class="column" data-col="In Progress"><h3>In Progress <span class="count"></span></h3><div class="dropzone"></div></div>
  <div class="column" data-col="Review"><h3>Review <span class="count"></span></h3><div class="dropzone"></div></div>
  <div class="column" data-col="Done"><h3>Done <span class="count"></span></h3><div class="dropzone"></div></div>
</main>

<section id="analytics">
  <h3>Analytics Dashboard</h3>
  <div id="stats"></div>
  <canvas id="burndown"></canvas>
</section>

</div>

<!-- TASK MODAL -->
<div class="modal" id="taskModal">
  <div class="modal-content">
    <h3 id="modalTitle">New Task</h3>
    <input id="taskTitle" placeholder="Task Title">
    <textarea id="taskDesc" placeholder="Description"></textarea>
    <div class="row">
      <select id="taskPriority"><option>Low</option><option>Medium</option><option>High</option></select>
      <input id="taskDue" type="date">
    </div>
    <input id="taskAssignee" placeholder="Assign to username">
    <div>Progress: <span id="progress">0%</span></div>
    <div id="subtasks"></div>
    <button onclick="addSubtask()">+ Add Subtask</button>
    <div class="timer-box">
      Time: <span id="timer">00:00:00</span>
      <button onclick="startTimer()">Start</button>
      <button onclick="pauseTimer()">Pause</button>
    </div>
    <div id="liveIndicator"></div>
    <div class="modal-actions">
      <button onclick="saveTask()">Save</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
